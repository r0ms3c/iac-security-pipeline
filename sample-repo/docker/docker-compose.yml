# ============================================================
# Sample Infrastructure — Docker Compose
# Multi-container application stack
# Note: contains intentional issues for pipeline testing
# ============================================================

version: "3.8"

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sample-app
    restart: always
    ports:
      # SECURITY ISSUE: binding to all interfaces (0.0.0.0)
      - "0.0.0.0:8080:8080"
      # SECURITY ISSUE: exposing debug port externally
      - "0.0.0.0:5678:5678"
    environment:
      # SECURITY ISSUE: hardcoded credentials in compose file
      - DB_HOST=db
      - DB_PASSWORD=Password123!
      - SECRET_KEY=mysecretkey12345
      - DEBUG=true
    volumes:
      # SECURITY ISSUE: mounting docker socket (allows container escape)
      - /var/run/docker.sock:/var/run/docker.sock
      # SECURITY ISSUE: mounting sensitive host directory
      - /etc:/host-etc:ro
    # SECURITY ISSUE: privileged mode enabled
    privileged: true
    # SECURITY ISSUE: no resource limits
    networks:
      - app-network
    depends_on:
      - db

  db:
    image: postgres:14
    container_name: sample-db
    restart: always
    ports:
      # SECURITY ISSUE: database port exposed externally
      - "0.0.0.0:5432:5432"
    environment:
      # SECURITY ISSUE: hardcoded credentials
      - POSTGRES_PASSWORD=Password123!
      - POSTGRES_USER=admin
      - POSTGRES_DB=appdb
    volumes:
      - db-data:/var/lib/postgresql/data
    # SECURITY ISSUE: no resource limits on database
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: sample-nginx
    restart: always
    ports:
      - "80:80"
      # SECURITY ISSUE: should use HTTPS (443)
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    depends_on:
      - app

volumes:
  db-data:
    # SECURITY ISSUE: no encryption at rest configured

networks:
  app-network:
    driver: bridge
    # SECURITY ISSUE: no network isolation between services
